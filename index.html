<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Particle System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="controls">
        <h3>Panou Control</h3>
        <hr>
        <p>Ține apăsat click și mișcă mouse-ul!</p>
        
        <div class="control-group">
            <label for="sizeSlider">Mărime pensulă:</label>
            <input type="range" id="sizeSlider" min="1" max="20" value="5">
        </div>

        <div class="control-group">
            <label for="speedSlider">Viteză/Împrăștiere:</label>
            <input type="range" id="speedSlider" min="1" max="10" value="4">
        </div>

        <div class="control-group">
            <label for="colorPicker">Culoare bază:</label>
            <input type="color" id="colorPicker" value="#00ffcc">
        </div>

        <div class="control-group">
            <label for="trailSlider">Intensitate coadă (Trail):</label>
            <input type="range" id="trailSlider" min="1" max="10" value="2">
        </div>

        <button id="clearBtn">Șterge Ecranul</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
